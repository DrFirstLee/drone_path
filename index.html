<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드론 비행 경로 분석 및 시각화</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            box-sizing: border-box;
        }

        h1 {
            color: #111827;
            margin-bottom: 2rem;
            font-size: 2rem;
            text-align: center;
        }

        .upload-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 2rem;
            text-align: center;
        }

        .file-input-wrapper {
            margin-bottom: 1.5rem;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 2px dashed #d1d5db;
            display: inline-block;
            padding: 2rem 4rem;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
            width: 80%;
            max-width: 400px;
        }

        .custom-file-upload:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .button {
            background-color: #3b82f6;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 1rem;
        }

        .button:hover {
            background-color: #2563eb;
        }

        .button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1rem;
            font-weight: 500;
            min-height: 1.5rem;
        }

        .result-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            height: 80vh;
            /* Changed from pb-ratio to fixed viewport height for better map viewing */
            position: relative;
            display: none;
            /* Initially hidden */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚁 드론 비행 경로 분석</h1>

        <div class="upload-card">
            <div class="file-input-wrapper">
                <label for="csvFile" class="custom-file-upload" id="dropZone">
                    <span style="font-size: 2rem;">📂</span><br>
                    <span id="fileName">클릭하여 CSV 파일 선택 또는 드래그</span>
                </label>
                <input type="file" id="csvFile" accept=".csv" />
                <p style="margin-top: 1rem; color: #6b7280; font-size: 0.9rem; line-height: 1.4;">
                    ※ <strong>주의</strong>: CSV 파일은 반드시 <strong>앞 13개 컬럼의 순서</strong>를 지켜야 합니다.<br>
                    (시간, 경도, 위도, 고도, 롤, 피치, 요, 1x, 1y, 1z, 2x, 2y, 2z)
                </p>
            </div>

            <div style="display:flex; justify-content:center; align-items:center; gap:12px; flex-wrap:wrap;">
                <button id="analyzeBtn" class="button">분석 시작</button>
                <a href="logic.html" target="_blank" class="button" style="
                    background: transparent;
                    border: 2px solid #3b82f6;
                    color: #3b82f6;
                    text-decoration: none;
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    padding: 0.65rem 1.6rem;
                ">📖 로직보기</a>
            </div>
            <div id="status"></div>
        </div>

        <div class="result-container" id="resultContainer">
            <iframe id="resultFrame"></iframe>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('csvFile');
        const fileNameSpan = document.getElementById('fileName');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusDiv = document.getElementById('status');
        const resultContainer = document.getElementById('resultContainer');
        const resultFrame = document.getElementById('resultFrame');
        const dropZone = document.getElementById('dropZone');

        let currentClusters = [];
        let splitPreviewLayer = null;

        function initMergePanel() {
            let mergePanel = document.getElementById('mergePanelContainer');
            if (!mergePanel) {
                mergePanel = document.createElement('div');
                mergePanel.id = 'mergePanelContainer';
                mergePanel.className = 'upload-card';
                mergePanel.style.textAlign = 'left';
                mergePanel.style.marginTop = '2rem';
                mergePanel.style.display = 'none';
                mergePanel.innerHTML = `
                    <div id="mergeSection" style="margin-bottom: 2rem;">
                        <h3 style="margin-top: 0; margin-bottom: 1rem; color: #111827;">🔗 클러스터 병합 (Merge)</h3>
                        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                            <select id="mergeSelect1" style="flex: 1; padding: 0.75rem; font-size: 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; min-width: 150px;"></select>
                            <span style="font-weight: bold; font-size: 1.5rem; color: #6b7280;">+</span>
                            <select id="mergeSelect2" style="flex: 1; padding: 0.75rem; font-size: 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; min-width: 150px;"></select>
                            <button id="mergeBtn" class="button" style="padding: 0.75rem 2rem;">병합하기</button>
                        </div>
                    </div>
                    <div id="splitSection" style="border-top: 1px solid #e5e7eb; pt-4; margin-top: 1rem; padding-top: 1.5rem;">
                        <h3 style="margin-top: 0; margin-bottom: 1rem; color: #111827;">✂️ 클러스터 분리 (Split)</h3>
                        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                            <select id="splitSelect" style="flex: 1; padding: 0.75rem; font-size: 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; min-width: 200px;"></select>
                            <div style="flex: 1; min-width: 250px;">
                                <label style="display: block; font-size: 0.8rem; color: #6b7280; margin-bottom: 4px;">분리 시점 선택 (0% ~ 100%)</label>
                                <input type="range" id="splitPointRange" min="1" max="99" value="50" style="width: 100%;">
                            </div>
                            <button id="splitBtn" class="button" style="padding: 0.75rem 2rem; background-color: #ef4444;">분리하기</button>
                        </div>
                    </div>
                    <div id="renameSection" style="border-top: 1px solid #e5e7eb; pt-4; margin-top: 1rem; padding-top: 1.5rem;">
                        <h3 style="margin-top: 0; margin-bottom: 1rem; color: #111827;">✏️ 클러스터 이름 변경 (Rename)</h3>
                        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                            <select id="renameSelect" style="flex: 1; padding: 0.75rem; font-size: 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; min-width: 200px;"></select>
                            <input type="text" id="renameInput" placeholder="새로운 이름 입력" style="flex: 1; padding: 0.75rem; font-size: 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; min-width: 200px;" autocomplete="off">
                            <button id="renameBtn" class="button" style="padding: 0.75rem 2rem; background-color: #10b981;">변경하기</button>
                        </div>
                    </div>
                `;
                resultContainer.parentNode.insertBefore(mergePanel, resultContainer.nextSibling);

                document.getElementById('mergeBtn').addEventListener('click', performMerge);
                document.getElementById('splitBtn').addEventListener('click', performSplit);
                document.getElementById('renameBtn').addEventListener('click', performRename);

                // Add split preview listeners
                document.getElementById('splitPointRange').addEventListener('input', updateSplitPreview);
                document.getElementById('splitSelect').addEventListener('change', updateSplitPreview);
            }
        }

        function updateSplitPreview() {
            const splitId = parseInt(document.getElementById('splitSelect').value);
            const splitRatio = parseInt(document.getElementById('splitPointRange').value) / 100;
            const target = currentClusters.find(c => c.id === splitId);

            const iframeWin = document.getElementById('resultFrame').contentWindow;
            let mapObj = null;
            for (let key in iframeWin) {
                if (key.startsWith('map_') && iframeWin[key] && iframeWin[key].eachLayer) {
                    mapObj = iframeWin[key];
                    break;
                }
            }
            if (!mapObj || !iframeWin.L) return;

            // Remove existing preview
            if (splitPreviewLayer) {
                mapObj.removeLayer(splitPreviewLayer);
                splitPreviewLayer = null;
            }

            if (!target) return;

            mapObj.eachLayer(layer => {
                const tt = (layer.getTooltip && layer.getTooltip()) ? layer.getTooltip().getContent() : "";
                if (tt && tt.includes(`ID ${target.id}:`)) {
                    if (layer.getLatLngs) {
                        const latlngs = layer.getLatLngs();
                        if (latlngs.length > 0) {
                            const sIdx = Math.min(latlngs.length - 1, Math.floor(latlngs.length * splitRatio));
                            const splitPoint = latlngs[sIdx];

                            // Create a red dashed marker or circle at the split point
                            splitPreviewLayer = iframeWin.L.circleMarker(splitPoint, {
                                radius: 8,
                                color: '#ef4444',
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.3,
                                dashArray: '3, 3'
                            }).bindTooltip("분리 지점 예시", { permanent: false, direction: 'top' });

                            splitPreviewLayer.addTo(mapObj);
                        }
                    }
                }
            });
        }

        function extractClustersFromPanel() {
            const panel = document.getElementById('externalDownloadPanel');
            if (!panel) return;

            const links = panel.querySelectorAll('a');
            currentClusters = [];
            links.forEach(link => {
                const filename = link.getAttribute('download');
                if (!filename) return;
                const name = filename.replace('.csv', '');
                const lastDash = name.lastIndexOf('-');
                if (lastDash === -1) return;

                const type = name.substring(0, lastDash);
                const num = parseInt(name.substring(lastDash + 1));

                currentClusters.push({
                    name: name,
                    type: type,
                    id: num,
                    b64: link.href.split(',')[1],
                    linkElement: link
                });
            });

            currentClusters.sort((a, b) => a.id - b.id);
            updateMergeDropdowns();

            const mergePanel = document.getElementById('mergePanelContainer');
            if (mergePanel) {
                mergePanel.style.display = currentClusters.length >= 1 ? 'block' : 'none';
                document.getElementById('mergeSection').style.display = currentClusters.length > 1 ? 'block' : 'none';
                document.getElementById('splitSection').style.display = currentClusters.length >= 1 ? 'block' : 'none';
                document.getElementById('renameSection').style.display = currentClusters.length >= 1 ? 'block' : 'none';
            }
        }

        function updateMergeDropdowns() {

            const select1 = document.getElementById('mergeSelect1');
            const select2 = document.getElementById('mergeSelect2');
            const splitSelect = document.getElementById('splitSelect');
            const renameSelect = document.getElementById('renameSelect');
            if (!select1 || !select2 || !splitSelect || !renameSelect) return;

            const val1 = select1.value;
            const val2 = select2.value;
            const valSplit = splitSelect.value;
            const valRename = renameSelect.value;

            select1.innerHTML = '';
            select2.innerHTML = '';
            splitSelect.innerHTML = '';
            renameSelect.innerHTML = '';

            currentClusters.forEach(c => {
                const opt1 = new Option(c.name, c.id);
                select1.add(opt1);

                const opt2 = new Option(c.name, c.id);
                select2.add(opt2);

                const optS = new Option(c.name, c.id);
                splitSelect.add(optS);

                const optR = new Option(c.name, c.id);
                renameSelect.add(optR);
            });

            if (val1 && select1.querySelector(`option[value="${val1}"]`)) select1.value = val1;
            if (val2 && select2.querySelector(`option[value="${val2}"]`)) select2.value = val2;
            if (valSplit && splitSelect.querySelector(`option[value="${valSplit}"]`)) splitSelect.value = valSplit;
            if (valRename && renameSelect.querySelector(`option[value="${valRename}"]`)) renameSelect.value = valRename;
        }

        function performRename() {
            const renameId = parseInt(document.getElementById('renameSelect').value);
            const newNameInput = document.getElementById('renameInput').value.trim();

            if (!newNameInput) {
                alert("새로운 이름을 입력해주세요.");
                return;
            }

            const target = currentClusters.find(c => c.id === renameId);
            if (!target) return;

            if (currentClusters.some(c => c.name === newNameInput)) {
                alert("이미 존재하는 이름입니다. 다른 이름을 사용해주세요.");
                return;
            }

            const oldName = target.name;

            try {
                // Update internal state
                target.name = newNameInput;

                // Update UI: Download link element
                target.linkElement.textContent = `Download ${newNameInput}.csv`;
                target.linkElement.setAttribute('download', `${newNameInput}.csv`);

                // Update Map
                const iframeWin = document.getElementById('resultFrame').contentWindow;
                let mapObj = null;
                for (let key in iframeWin) {
                    if (key.startsWith('map_') && iframeWin[key] && iframeWin[key].eachLayer) {
                        mapObj = iframeWin[key];
                        break;
                    }
                }

                if (mapObj) {
                    mapObj.eachLayer(layer => {
                        const tt = (layer.getTooltip && layer.getTooltip()) ? layer.getTooltip().getContent() : "";

                        // Match Polyline by ID
                        const matchById = tt && tt.includes(`ID ${target.id}:`);
                        if (matchById) {
                            layer.setTooltipContent(`ID ${target.id}: ${newNameInput}`);
                        }

                        // Also update existing labels (DivIcon markers)
                        if (layer.options && layer.options.icon && layer.options.icon.options && layer.options.icon.options.html) {
                            let html = layer.options.icon.options.html;
                            if (html.includes(oldName)) {
                                const escaped = oldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                const newHtml = html.replace(new RegExp(escaped, 'g'), newNameInput);
                                layer.setIcon(iframeWin.L.divIcon({
                                    className: layer.options.icon.options.className,
                                    html: newHtml,
                                    iconSize: layer.options.icon.options.iconSize,
                                    iconAnchor: layer.options.icon.options.iconAnchor
                                }));
                            }
                        }
                    });
                }

                updateMergeDropdowns();
                document.getElementById('renameInput').value = '';
                alert(`이름이 '${oldName}'에서 '${newNameInput}'(으)로 변경되었습니다.`);

            } catch (err) {
                console.error("Rename error:", err);
                alert("이름 변경 중 오류가 발생했습니다: " + err.message);
            }
        }

        function performSplit() {
            const splitId = parseInt(document.getElementById('splitSelect').value);
            const splitRatio = parseInt(document.getElementById('splitPointRange').value) / 100;

            const target = currentClusters.find(c => c.id === splitId);
            if (!target) return;

            try {
                const csvContent = decodeURIComponent(escape(atob(target.b64)));
                const lines = csvContent.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length < 3) {
                    alert("데이터가 너무 적어 분리할 수 없습니다.");
                    return;
                }

                const header = lines[0];
                const dataLines = lines.slice(1);

                // Use the exact same index calculation for both Map and CSV
                const splitIndex = Math.max(1, Math.min(dataLines.length - 1, Math.floor(dataLines.length * splitRatio)));

                const part1Lines = dataLines.slice(0, splitIndex);
                const part2Lines = dataLines.slice(splitIndex);

                const csv1 = header + "\n" + part1Lines.join("\n");
                const csv2 = header + "\n" + part2Lines.join("\n");

                // Determine name for the shorter one
                let newBase = target.name.includes('_splitted') ? target.name.split('_splitted')[0] + '_splitted' : target.name + '_splitted';
                let candidate = newBase;
                let counter = 1;
                const existingNames = currentClusters.map(c => c.name);

                while (existingNames.includes(candidate) || candidate === target.name) {
                    counter++;
                    candidate = newBase + '_' + counter;
                }

                let name1, name2;
                if (part1Lines.length < part2Lines.length) {
                    name1 = candidate;
                    name2 = target.name;
                } else {
                    name1 = target.name;
                    name2 = candidate;
                }

                // Update UI: Modify original link, add new link
                target.linkElement.textContent = `Download ${name1}.csv`;
                target.linkElement.setAttribute('download', `${name1}.csv`);
                target.b64 = btoa(unescape(encodeURIComponent(csv1)));
                target.linkElement.href = 'data:text/csv;base64,' + target.b64;
                target.name = name1;

                const newLink = document.createElement('a');
                newLink.textContent = `Download ${name2}.csv`;
                newLink.setAttribute('download', `${name2}.csv`);
                const b64_2 = btoa(unescape(encodeURIComponent(csv2)));
                newLink.href = 'data:text/csv;base64,' + b64_2;
                newLink.style.display = 'block';
                newLink.style.margin = '5px 0';
                newLink.style.color = '#3b82f6';
                newLink.style.textDecoration = 'none';

                target.linkElement.parentNode.insertBefore(newLink, target.linkElement.nextSibling);

                // Add to internal state
                const newId = Math.max(0, ...currentClusters.map(c => c.id)) + 1;
                currentClusters.push({
                    name: name2,
                    type: target.type,
                    id: newId,
                    b64: b64_2,
                    linkElement: newLink
                });

                // Update Map
                const iframeWin = document.getElementById('resultFrame').contentWindow;
                let mapObj = null;
                for (let key in iframeWin) {
                    if (key.startsWith('map_') && iframeWin[key] && iframeWin[key].eachLayer) {
                        mapObj = iframeWin[key];
                        break;
                    }
                }

                if (mapObj && iframeWin.L) {
                    let splitLayerInfo = null;
                    let labelsToUpdate = [];

                    // DEBUG: log all tooltips to find the correct format
                    console.log('[Split] Looking for cluster name:', target.name, 'id:', target.id);
                    mapObj.eachLayer(layer => {
                        const tt = (layer.getTooltip && layer.getTooltip()) ? layer.getTooltip().getContent() : "";
                        if (tt) console.log('[Split] Layer tooltip:', tt);
                    });

                    mapObj.eachLayer(layer => {
                        const tt = (layer.getTooltip && layer.getTooltip()) ? layer.getTooltip().getContent() : "";

                        // Match by name OR by ID — whichever works
                        const matchById = tt && tt.includes(`ID ${target.id}:`);
                        const matchByName = tt && tt.includes(target.name);
                        const isMatch = matchById || matchByName;

                        if (isMatch && layer.getLatLngs) {
                            const latlngs = layer.getLatLngs();
                            const sIdx = Math.min(latlngs.length - 1, splitIndex);
                            const pts1 = latlngs.slice(0, sIdx + 1);
                            const pts2 = latlngs.slice(sIdx);

                            console.log('[Split] Matched layer! pts1:', pts1.length, 'pts2:', pts2.length, 'tooltip:', tt);

                            layer.setLatLngs(pts1);
                            layer.setTooltipContent(`ID ${target.id}: ${name1}`);
                            layer.off('click');
                            layer.on('click', (e) => handleMapLineClick(target.id, e.latlng, layer));

                            if (!splitLayerInfo) {
                                splitLayerInfo = {
                                    pts1,
                                    pts2,
                                    color: layer.options.color,
                                    weight: layer.options.weight,
                                    opacity: layer.options.opacity
                                };
                            }
                        }

                        // Collect labels to update (DivIcon markers)
                        if (layer.options && layer.options.icon && layer.options.icon.options && layer.options.icon.options.html) {
                            const html = layer.options.icon.options.html;
                            const oldName = target.name;

                            // Parse HTML to get pure text content
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = html;
                            const textContent = tempDiv.textContent || tempDiv.innerText || "";

                            // Try exact textual match.
                            // However, sometimes html itself contains elements like svg that we don't want to match wrongly.
                            // We use a RegExp to ensure oldName is matched as a whole word/token inside the string, not as a substring of something like "Line-5_splitted".
                            const escapedName = oldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            // Match oldName where it's NOT immediately followed by _splitted or similar word chars
                            const exactNameRegex = new RegExp(`(?<![a-zA-Z0-9_-])${escapedName}(?![a-zA-Z0-9_-])`);

                            if (textContent.trim() === oldName.trim() || exactNameRegex.test(html) || html.includes(`>${oldName}<`)) {
                                labelsToUpdate.push({ layer, html, oldName });
                            }
                        }
                    });

                    console.log('[Split] splitLayerInfo:', splitLayerInfo, 'labelsToUpdate:', labelsToUpdate.length);

                    // Add new layer and label OUTSIDE the eachLayer loop
                    if (splitLayerInfo) {
                        const { pts1, pts2, color, weight, opacity } = splitLayerInfo;

                        // Generate a visually distinct color for the new split section
                        const distinctColors = ['#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#46f0f0', '#f032e6', '#bcf60c', '#fabebe', '#008080', '#e6beff', '#9a6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#808080', '#000000'];
                        let newColor = color;
                        for (let i = 0; i < 10; i++) {
                            const candidate = distinctColors[Math.floor(Math.random() * distinctColors.length)];
                            if (candidate !== color) {
                                newColor = candidate;
                                break;
                            }
                        }

                        // We can also add a small dash pattern to make it even more distinct
                        const layer2 = iframeWin.L.polyline(pts2, {
                            color: newColor,
                            weight: weight ? weight + 1 : 5,
                            opacity: opacity,
                            dashArray: '10, 10' // dashed line for visual separation
                        });
                        layer2.bindTooltip(`ID ${newId}: ${name2}`);
                        layer2.addTo(mapObj);
                        layer2.on('click', (e) => handleMapLineClick(newId, e.latlng, layer2));

                        if (pts2.length > 0) {
                            const MathFloor = Math.floor;
                            const labelPos2 = pts2[MathFloor(pts2.length / 2)];
                            // Use Folium-like marker style: Just the text on the map with no background, just the text color
                            const foliumHtml2 = `<div style="color: ${newColor}; white-space: nowrap; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;">${name2}</div>`;
                            const labelIcon2 = iframeWin.L.divIcon({
                                className: 'leaflet-popup-marker', // Empty class to remove default leaflet styles
                                html: foliumHtml2,
                                iconSize: null,
                                iconAnchor: [0, 0]
                            });
                            iframeWin.L.marker(labelPos2, { icon: labelIcon2, interactive: false }).addTo(mapObj);
                            console.log('[Split] Added new polyline and marker for', name2, 'with color', newColor);
                        }

                        // Move and update existing labels
                        labelsToUpdate.forEach(({ layer, html, oldName }) => {
                            const escaped = oldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            const newHtml = html.replace(new RegExp(escaped, 'g'), name1);
                            layer.setIcon(iframeWin.L.divIcon({
                                className: layer.options.icon.options.className,
                                html: newHtml,
                                iconSize: layer.options.icon.options.iconSize,
                                iconAnchor: layer.options.icon.options.iconAnchor
                            }));

                            // Recalculate and set new position to center of the 1st segment
                            if (pts1.length > 0) {
                                const MathFloor = Math.floor;
                                const newPos1 = pts1[MathFloor(pts1.length / 2)];
                                layer.setLatLng(newPos1);
                            }
                        });

                    } else {
                        console.warn('[Split] No matching layer found in map! Cannot split visually.');
                    }

                } else {
                    console.warn('[Split] mapObj or L not found in iframe.');
                }


                updateMergeDropdowns();

                // Clear preview
                if (splitPreviewLayer) {
                    const iframeWin = document.getElementById('resultFrame').contentWindow;
                    let mapObj = null;
                    for (let key in iframeWin) {
                        if (key.startsWith('map_') && iframeWin[key] && iframeWin[key].eachLayer) {
                            mapObj = iframeWin[key];
                            break;
                        }
                    }
                    if (mapObj) mapObj.removeLayer(splitPreviewLayer);
                    splitPreviewLayer = null;
                }

                alert(`성공적으로 분리되었습니다.\n1번: ${name1} (${part1Lines.length}행)\n2번: ${name2} (${part2Lines.length}행)`);

            } catch (err) {
                console.error("Split error:", err);
                alert("분리 중 오류가 발생했습니다: " + err.message);
            }
        }

        // --- Map interaction additions ---
        function setupMapInteractions() {
            const iframeWin = document.getElementById('resultFrame').contentWindow;
            let mapObj = null;
            for (let key in iframeWin) {
                if (key.startsWith('map_') && iframeWin[key] && iframeWin[key].eachLayer) {
                    mapObj = iframeWin[key];
                    break;
                }
            }
            if (!mapObj || !iframeWin.L) return;

            mapObj.eachLayer(layer => {
                if (layer instanceof iframeWin.L.Polyline && !(layer instanceof iframeWin.L.Polygon)) {
                    const tt = (layer.getTooltip && layer.getTooltip()) ? layer.getTooltip().getContent() : "";
                    const match = tt.match(/ID (\d+):/);
                    if (match) {
                        const clusterId = parseInt(match[1]);
                        layer.off('click'); // Remove any existing click handlers to prevent duplicates
                        layer.on('click', (e) => handleMapLineClick(clusterId, e.latlng, layer));
                        layer.setStyle({ cursor: 'pointer' });
                    }
                }
            });
        }

        function handleMapLineClick(clusterId, clickLatLng, layer) {
            const latlngs = layer.getLatLngs();
            let minDist = Infinity;
            let splitIdx = 0;

            for (let i = 0; i < latlngs.length; i++) {
                const dist = clickLatLng.distanceTo(latlngs[i]);
                if (dist < minDist) {
                    minDist = dist;
                    splitIdx = i;
                }
            }

            const ratio = (splitIdx / (latlngs.length - 1)) * 100;

            if (confirm(`ID ${clusterId} 클러스터를 이 지점에서 분리하시겠습니까?\n(클릭 지점: 약 ${Math.round(ratio)}%)`)) {
                const select = document.getElementById('splitSelect');
                select.value = clusterId;
                const range = document.getElementById('splitPointRange');
                range.value = Math.round(ratio);
                performSplit();
            }
        }

        function performMerge() {
            const id1 = parseInt(document.getElementById('mergeSelect1').value);
            const id2 = parseInt(document.getElementById('mergeSelect2').value);

            if (id1 === id2) {
                alert("서로 다른 두 클러스터를 선택해주세요.");
                return;
            }

            const cPrimary = currentClusters.find(c => c.id === Math.min(id1, id2));
            const cSecondary = currentClusters.find(c => c.id === Math.max(id1, id2));

            if (!cPrimary || !cSecondary) return;

            try {
                // 1. Merge CSV files
                const csv1 = decodeURIComponent(escape(atob(cPrimary.b64)));
                const csv2 = decodeURIComponent(escape(atob(cSecondary.b64)));

                const lines2 = csv2.split(/\r?\n/);
                if (lines2.length > 0) lines2.shift(); // remove header

                const mergedCsv = csv1 + (csv1.endsWith('\n') ? '' : '\n') + lines2.join('\n');
                cPrimary.b64 = btoa(unescape(encodeURIComponent(mergedCsv)));
                cPrimary.linkElement.href = 'data:text/csv;base64,' + cPrimary.b64;

                // Remove secondary CSV from UI
                if (cSecondary.linkElement.parentNode) {
                    cSecondary.linkElement.parentNode.removeChild(cSecondary.linkElement);
                }

                // Update tracked clusters
                currentClusters = currentClusters.filter(c => c.id !== cSecondary.id);
                updateMergeDropdowns();

                if (currentClusters.length <= 1) {
                    document.getElementById('mergePanelContainer').style.display = 'none';
                }

                // 2. Merge visually on Map
                const iframeWin = document.getElementById('resultFrame').contentWindow;
                let mapObj = null;
                for (let key in iframeWin) {
                    if (key.startsWith('map_') && iframeWin[key] && iframeWin[key].eachLayer) {
                        mapObj = iframeWin[key];
                        break;
                    }
                }

                if (mapObj) {
                    let primaryColor = '#000000';
                    let primaryTooltip = "";
                    let lastP1 = null;
                    let firstP2 = null;

                    // Get primary style details
                    mapObj.eachLayer(layer => {
                        if (layer.options && layer.options.color && layer.getTooltip) {
                            const tt = layer.getTooltip();
                            if (tt && tt.getContent() && tt.getContent().includes(`ID ${cPrimary.id}:`)) {
                                primaryColor = layer.options.color;
                                primaryTooltip = tt.getContent();
                            }
                        }
                    });

                    // Apply to secondary and find coordinate boundaries for connecting line
                    mapObj.eachLayer(layer => {
                        // Apply to secondary polylines
                        if (layer.options && layer.options.color && layer.getTooltip) {
                            const tt = layer.getTooltip();
                            if (tt && tt.getContent() && tt.getContent().includes(`ID ${cSecondary.id}:`)) {
                                layer.setStyle({ color: primaryColor });
                                layer.setTooltipContent(primaryTooltip || `ID ${cPrimary.id} (Merged)`);

                                if (layer.getLatLngs) {
                                    const latlngs = layer.getLatLngs();
                                    if (latlngs.length > 0 && !firstP2) firstP2 = latlngs[0];
                                }
                            } else if (tt && tt.getContent() && tt.getContent().includes(`ID ${cPrimary.id}:`)) {
                                if (layer.getLatLngs) {
                                    const latlngs = layer.getLatLngs();
                                    if (latlngs.length > 0) lastP1 = latlngs[latlngs.length - 1]; // last point of primary
                                }
                            }
                        }

                        // Apply markers
                        if (layer.options && layer.options.icon && layer.options.icon.options && layer.options.icon.options.html) {
                            const html = layer.options.icon.options.html;
                            if (html.includes(`${cSecondary.name}`) || html.includes(`ID ${cSecondary.id}`)) {
                                // Large marker text -> remove
                                if (html.includes(`${cSecondary.name}`)) {
                                    mapObj.removeLayer(layer);
                                } else if (html.includes(`part start`)) {
                                    // Small circle markers -> change color
                                    layer.setStyle({ color: primaryColor });
                                    const popup = layer.getPopup();
                                    if (popup) {
                                        popup.setContent(popup.getContent().replace(`ID ${cSecondary.id}`, `ID ${cPrimary.id}`));
                                    }
                                }
                            }
                        }
                    });

                    // Add connecting line
                    if (lastP1 && firstP2 && iframeWin.L) {
                        const connectingLine = iframeWin.L.polyline([lastP1, firstP2], {
                            color: primaryColor,
                            weight: 4,
                            opacity: 0.8,
                            dashArray: '5, 5'
                        });
                        connectingLine.bindTooltip(primaryTooltip || `ID ${cPrimary.id} (Merged)`);
                        connectingLine.addTo(mapObj);
                    }
                }

                alert(`${cSecondary.name} 클러스터가 ${cPrimary.name} 에 성공적으로 병합되었습니다!`);
            } catch (err) {
                console.error("Merge error:", err);
                alert("병합 중 오류가 발생했습니다: " + err.message);
            }
        }

        // File selection handler
        fileInput.addEventListener('change', function () {
            if (this.files && this.files.length > 0) {
                fileNameSpan.textContent = this.files[0].name;
                statusDiv.textContent = "";
                statusDiv.style.color = "inherit";
            }
        });

        // Drag and Drop handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#3b82f6';
            dropZone.style.backgroundColor = '#eff6ff';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.backgroundColor = 'transparent';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.backgroundColor = 'transparent';

            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                fileNameSpan.textContent = fileInput.files[0].name;
            }
        });

        // Analyze button handler
        analyzeBtn.addEventListener('click', async () => {
            if (!fileInput.files || fileInput.files.length === 0) {
                alert("분석할 CSV 파일을 먼저 선택해주세요.");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            // UI Update: Progress start
            analyzeBtn.disabled = true;
            statusDiv.innerHTML = '<div class="loader"></div> 문서를 업로드하고 분석을 시작합니다... (잠시만 기다려주세요)';
            statusDiv.style.color = "#3b82f6";
            resultContainer.style.display = 'none';

            try {
                // 1. Request Analysis (Start Job)
                const startResponse = await fetch('https://chatbot.naranja.my/drone_analyze', {
                    method: 'POST',
                    body: formData
                });

                if (!startResponse.ok) {
                    throw new Error(`Server responded with status: ${startResponse.status}`);
                }

                // The server returns the raw HTML content of the map
                let htmlContent = await startResponse.text();

                // Display Result
                statusDiv.textContent = "분석 완료! 결과 지도를 표시합니다.";
                statusDiv.style.color = "#059669"; // Green

                // [Update] Check for embedded CSV download panel and extract it to the main UI
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                const headings = Array.from(doc.querySelectorAll('h4'));
                const downloadHeader = headings.find(h => h.textContent.includes('Segment CSV Downloads'));

                let externalPanel = document.getElementById('externalDownloadPanel');
                if (externalPanel) {
                    externalPanel.style.display = 'none'; // Reset previous results
                }

                if (downloadHeader) {
                    const downloadDiv = downloadHeader.parentElement;

                    // Create container if not exists
                    if (!externalPanel) {
                        externalPanel = document.createElement('div');
                        externalPanel.id = 'externalDownloadPanel';
                        externalPanel.className = 'upload-card'; // Use existing card style
                        externalPanel.style.textAlign = 'left';
                        externalPanel.style.maxHeight = '300px';
                        externalPanel.style.overflowY = 'auto';
                        externalPanel.style.marginTop = '2rem';
                        // Insert after result container
                        resultContainer.parentNode.insertBefore(externalPanel, resultContainer.nextSibling);
                    }

                    // Copy content
                    externalPanel.innerHTML = downloadDiv.innerHTML;
                    externalPanel.style.display = 'block';

                    // Remove from the map HTML so it doesn't cover the map
                    downloadDiv.remove();
                    htmlContent = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                }

                // Inject the HTML directly into the iframe
                resultFrame.srcdoc = htmlContent;
                resultContainer.style.display = 'block';

                resultFrame.onload = () => {
                    initMergePanel();
                    extractClustersFromPanel();
                    setupMapInteractions();
                };

                // Scroll to result
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error("Analysis failed:", error);
                statusDiv.textContent = "오류 발생: " + error.message;
                statusDiv.style.color = "#dc2626"; // Red
            } finally {
                analyzeBtn.disabled = false;
            }
        });

        // 엔터키 입력 시 분석 시작
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (fileInput.files && fileInput.files.length > 0 && !analyzeBtn.disabled) {
                    analyzeBtn.click();
                }
            }
        });
    </script>
</body>
